# Example Spring Boot application configuration
# Copy to application.yml and fill secrets before running locally.

server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

miniwallet:
  default-currency: USD

security:
  jwt:
    # Set JWT_SECRET to a Base64-encoded 256-bit or stronger HMAC key.
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour
