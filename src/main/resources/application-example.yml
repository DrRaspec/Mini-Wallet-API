# Example Spring Boot application configuration
# Copy to application.yml and set all required environment variables before running.
# Required environment variables:
#   - DB_URL (default: jdbc:postgresql://localhost:5432/mini_wallet_db)
#   - DB_USERNAME (default: mini_wallet_user)
#   - DB_PASSWORD (required - no default)
#   - JWT_SECRET (required - no default, must be Base64-encoded 256-bit+ HMAC key)

server:
  port: 8080

spring:
  application:
    name: MiniWalletApi

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mini_wallet_db}
    username: ${DB_USERNAME:mini_wallet_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
